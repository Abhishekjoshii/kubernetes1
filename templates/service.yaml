apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: shopeasy
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: shopeasy
  ports:
    - port: 5005
      targetPort: 5000
  type: NodePort